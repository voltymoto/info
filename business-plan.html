<style>
:root{
  --red:#E2231A; --red-d:#9c130c; --red-l:#ff4133;
  --bg:#0a0a0b; --bg1:#121214; --bg2:#17171a; --bg3:#202024;
  --white:#f5f5f6; --muted:#9b9ba2; --faint:#6c6c73;
  --blue:#56a6f2; --green:#aef24a; --amber:#ff7a4d;
  --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.18);
  --disp:"Saira Condensed",sans-serif; --mono:"Space Mono",monospace; --body:"Sora",sans-serif;
  --max:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--body);font-weight:300;line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:var(--max);margin:0 auto;padding:0 28px}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--red);font-weight:700;display:inline-block}
.eyebrow.blue{color:var(--blue)} .eyebrow.green{color:var(--green)} .eyebrow.mut{color:var(--faint)}
h1,h2,h3,h4{font-family:var(--disp);font-weight:800;line-height:.95;letter-spacing:-.01em;text-transform:uppercase}
h2{font-size:clamp(34px,5.2vw,68px);margin:14px 0 18px}
h3{font-size:clamp(20px,2.4vw,30px);margin:0 0 10px}
h4{font-size:18px;letter-spacing:.02em}
.lead{font-size:clamp(15px,1.4vw,19px);color:var(--muted);font-weight:300;max-width:64ch}
p{color:var(--muted);max-width:70ch}
p+p{margin-top:14px}
b,strong{color:var(--white);font-weight:600}
.num{font-family:var(--disp);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;color:var(--white)}
section{position:relative;border-top:1px solid var(--line)}
.pad{padding:clamp(64px,8vw,118px) 0}
.tight{padding:clamp(40px,5vw,70px) 0}
.alt{background:var(--bg1)}
.reg{background:linear-gradient(180deg,#0c1018,#0a0a0b)}
.eco{background:linear-gradient(180deg,#0d100a,#0a0a0b)}

/* reveal */
.rv{opacity:0;transform:translateY(24px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}
.rv.in{opacity:1;transform:none}
.rv.d1{transition-delay:.07s}.rv.d2{transition-delay:.14s}.rv.d3{transition-delay:.21s}.rv.d4{transition-delay:.28s}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:80;display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;backdrop-filter:blur(10px);background:rgba(10,10,11,0);transition:background .35s,border-color .35s;border-bottom:1px solid transparent}
nav.scrolled{background:rgba(10,10,11,.86);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--disp);font-weight:900;font-size:22px;letter-spacing:.06em}
.brand .mk{width:14px;height:14px;background:var(--red);border-radius:3px;box-shadow:0 0 14px rgba(226,35,26,.7)}
.brand small{font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase}
.nlinks{display:flex;gap:26px;align-items:center}
.nlinks a{font-size:13px;color:var(--muted);transition:color .2s}
.nlinks a:hover{color:var(--white)}
.pill{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);border:1px solid rgba(226,35,26,.4);padding:5px 11px;border-radius:3px}
@media(max-width:820px){.nlinks{display:none}}

/* HERO / COVER */
.cover{min-height:100vh;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;
  background:radial-gradient(120% 90% at 78% 18%,rgba(226,35,26,.22),transparent 55%),var(--bg)}
.cover:before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:64px 64px;mask-image:radial-gradient(120% 80% at 70% 20%,#000,transparent 70%);opacity:.5}
.cover .wrap{position:relative;z-index:2}
.cover h1{font-size:clamp(54px,11vw,150px);line-height:.86}
.cover h1 em{font-style:normal;color:var(--red);display:block}
.cover .sub{font-family:var(--disp);font-weight:600;font-size:clamp(18px,2.4vw,30px);text-transform:uppercase;letter-spacing:.01em;color:var(--white);margin-top:16px}
.cover .meta{margin-top:34px;display:flex;flex-wrap:wrap;gap:14px 34px;font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.04em}
.cover .meta b{color:var(--muted);font-weight:400}
.scrollcue{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;animation:bob 2.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

/* STAT GRIDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:8px}
.stats.c3{grid-template-columns:repeat(3,1fr)}
.stats.c2{grid-template-columns:repeat(2,1fr)}
.stat{background:var(--bg1);padding:24px 22px}
.stat .k{font-family:var(--disp);font-weight:800;font-size:clamp(30px,3.6vw,46px);line-height:1;letter-spacing:-.02em}
.stat .k.red{color:var(--red-l)}.stat .k.blue{color:var(--blue)}.stat .k.green{color:var(--green)}
.stat .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:9px}
.stat p{font-size:13px;margin-top:10px;color:var(--muted)}
@media(max-width:880px){.stats,.stats.c3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.stats,.stats.c3,.stats.c2{grid-template-columns:1fr}}

/* SPLIT */
.split{display:grid;grid-template-columns:1fr 1fr;gap:54px;align-items:start}
.split.wide{grid-template-columns:1.1fr .9fr}
@media(max-width:820px){.split,.split.wide{grid-template-columns:1fr;gap:34px}}
.ul{list-style:none;margin-top:18px}
.ul li{position:relative;padding:11px 0 11px 26px;border-bottom:1px solid var(--line);color:var(--muted);font-size:15px}
.ul li:before{content:"";position:absolute;left:0;top:18px;width:9px;height:9px;background:var(--red);border-radius:2px}
.ul li b{color:var(--white)}
.ul.blue li:before{background:var(--blue)} .ul.green li:before{background:var(--green)}

/* CARDS */
.card{background:var(--bg1);border:1px solid var(--line);border-radius:10px;padding:26px}
.cardgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
.cardgrid.c2{grid-template-columns:repeat(2,1fr)}
@media(max-width:820px){.cardgrid,.cardgrid.c2{grid-template-columns:1fr}}
.card .tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:12px}
.card .tag.blue{color:var(--blue)}.card .tag.green{color:var(--green)}.card .tag.mut{color:var(--faint)}
.card p{font-size:14px}

/* CALLOUT */
.callout{border-left:3px solid var(--red);background:var(--bg1);padding:22px 26px;border-radius:0 8px 8px 0;margin-top:8px}
.callout.blue{border-color:var(--blue)} .callout.green{border-color:var(--green)}
.callout .big{font-family:var(--disp);font-weight:800;font-size:clamp(22px,2.6vw,32px);line-height:1.04;color:var(--white)}
.callout p{margin-top:10px;font-size:14px}

/* TABLE */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-top:8px}
table.tbl{width:100%;border-collapse:collapse;font-size:14px;min-width:560px}
.tbl th,.tbl td{text-align:left;padding:13px 16px;border-bottom:1px solid var(--line)}
.tbl thead th{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:400;background:var(--bg2)}
.tbl td{color:var(--muted)}
.tbl td:first-child{color:var(--white);font-weight:500}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tr.hl td,.tbl tr.hl td{}
.tbl tr.hl td{background:rgba(226,35,26,.10);color:var(--white)}
.tbl tr.hl td:first-child{box-shadow:inset 3px 0 0 var(--red)}
.tbl .pos{color:var(--green)} .tbl .neg{color:var(--red-l)}
.tnote{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:12px;letter-spacing:.02em}

/* BARS */
.bars{margin-top:8px}
.barrow{display:grid;grid-template-columns:200px 1fr 96px;gap:16px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.barrow .bl{font-size:13px;color:var(--muted)}
.barrow .bt{font-family:var(--disp);font-weight:800;text-align:right;font-size:18px}
.bartrack{height:12px;background:var(--bg2);border-radius:6px;overflow:hidden}
.bar{height:100%;width:0;border-radius:6px;transition:width 1.3s cubic-bezier(.2,.7,.2,1)}
.bar.red{background:linear-gradient(90deg,var(--red-d),var(--red-l))}
.bar.green{background:linear-gradient(90deg,#5a8a1e,var(--green))}
.bar.blue{background:linear-gradient(90deg,#2f6db5,var(--blue))}
.bar.gray{background:linear-gradient(90deg,#33333a,#5a5a64)}
@media(max-width:600px){.barrow{grid-template-columns:120px 1fr 70px;gap:10px}.barrow .bl{font-size:12px}}

/* TIMELINE */
.tl{position:relative;margin-top:10px;padding-left:26px}
.tl:before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--red),transparent)}
.tlitem{position:relative;padding:0 0 30px 22px}
.tlitem:before{content:"";position:absolute;left:-26px;top:3px;width:14px;height:14px;border-radius:50%;background:var(--bg);border:3px solid var(--red)}
.tlitem .d{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red)}
.tlitem h4{margin:6px 0 6px}
.tlitem p{font-size:14px}

/* PARTNER / STATUS */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:8px}
@media(max-width:820px){.pgrid{grid-template-columns:1fr}}
.pcard{background:var(--bg1);border:1px solid var(--line);border-radius:10px;padding:22px;display:flex;flex-direction:column;gap:8px}
.pcard .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.pcard .nm{font-family:var(--disp);font-weight:800;font-size:21px;text-transform:uppercase}
.status{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:3px;white-space:nowrap}
.status.live{color:var(--green);border:1px solid rgba(174,242,74,.35)}
.status.neg{color:var(--amber);border:1px solid rgba(255,122,77,.35)}
.status.draft{color:var(--blue);border:1px solid rgba(86,166,242,.35)}
.pcard p{font-size:13.5px}

/* TEAM */
.team{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:8px}
@media(max-width:680px){.team{grid-template-columns:1fr}}
.member{background:var(--bg1);border:1px solid var(--line);border-radius:10px;padding:22px;display:flex;gap:16px;align-items:flex-start}
.member .av{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,var(--red-d),var(--red-l));display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;font-size:20px;flex-shrink:0}
.member .nm{font-family:var(--disp);font-weight:700;font-size:19px;text-transform:uppercase;letter-spacing:.01em}
.member .ro{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.06em;margin:3px 0 8px}
.member p{font-size:13px}

/* RISK */
.risk{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:8px}
@media(max-width:680px){.risk{grid-template-columns:1fr}}
.risk .cell{background:var(--bg1);padding:22px}
.risk .rk{font-family:var(--disp);font-weight:700;font-size:17px;text-transform:uppercase;color:var(--red-l);margin-bottom:8px}
.risk .mt{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.risk p{font-size:13.5px}

/* BTN / CONTACT / FOOTER */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line2);padding:13px 22px;border-radius:6px;transition:.25s}
.btn:hover{border-color:var(--white)}
.btn.prime{background:var(--red);border-color:var(--red);color:#fff}
.btn.prime:hover{background:var(--red-l);border-color:var(--red-l)}
.cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
.contact h2 em{font-style:normal;color:var(--red)}
.cinfo{margin-top:22px;font-size:16px}
.cinfo .nm{font-family:var(--disp);font-weight:700;font-size:24px;text-transform:uppercase}
.cinfo a{color:var(--red-l)}
.cinfo .ph{color:var(--faint);font-family:var(--mono);font-size:13px;margin-top:6px}
footer{border-top:1px solid var(--line);padding:30px 0}
footer .wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
footer .fb{font-family:var(--disp);font-weight:900;font-size:20px;letter-spacing:.06em;display:flex;align-items:center;gap:9px}
footer .fb .mk{width:11px;height:11px;background:var(--red);border-radius:2px}
footer .meta{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}

/* GATE */
.gate{position:fixed;inset:0;z-index:200;background:
  radial-gradient(120% 90% at 50% 30%,rgba(226,35,26,.18),transparent 55%),#070708;
  display:flex;align-items:center;justify-content:center;padding:24px}
.gate:before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:58px 58px;mask-image:radial-gradient(100% 70% at 50% 40%,#000,transparent 72%);opacity:.45}
.gatecard{position:relative;z-index:2;width:100%;max-width:400px;text-align:center}
.gatecard .mk{width:18px;height:18px;background:var(--red);border-radius:4px;margin:0 auto 22px;box-shadow:0 0 24px rgba(226,35,26,.8)}
.gatecard .bd{font-family:var(--disp);font-weight:900;font-size:42px;letter-spacing:.08em;text-transform:uppercase}
.gatecard .sb{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-top:6px}
.gatecard .ti{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin:30px 0 14px}
.gateform{display:flex;flex-direction:column;gap:12px}
.gate input{font-family:var(--mono);font-size:15px;text-align:center;letter-spacing:.06em;color:var(--white);background:var(--bg2);
  border:1px solid var(--line2);border-radius:7px;padding:15px 16px;outline:none;transition:border-color .2s}
.gate input:focus{border-color:var(--red)}
.gate button{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;background:var(--red);color:#fff;
  border:none;border-radius:7px;padding:15px;cursor:pointer;transition:background .2s}
.gate button:hover{background:var(--red-l)}
.gate button:disabled{opacity:.55;cursor:wait}
.gate .err{font-family:var(--mono);font-size:11.5px;color:var(--red-l);min-height:16px;letter-spacing:.03em}
.gate .note{font-family:var(--mono);font-size:10px;color:var(--faint);line-height:1.7;margin-top:26px;letter-spacing:.02em}

/* ===================== HOVER EFFECTS ===================== */
.card,.pcard,.member{transition:transform .28s cubic-bezier(.2,.7,.2,1),border-color .28s,box-shadow .28s}
.card:hover,.member:hover{transform:translateY(-4px);border-color:var(--line2);box-shadow:0 16px 36px rgba(0,0,0,.45)}
.pcard:hover{transform:translateY(-4px);border-color:rgba(226,35,26,.45);box-shadow:0 16px 36px rgba(0,0,0,.45)}
.member .av{transition:transform .28s cubic-bezier(.2,.7,.2,1)}
.member:hover .av{transform:scale(1.07) rotate(-3deg)}

.stat{transition:background .25s}
.stat:hover{background:var(--bg2)}
.stat .k{transition:text-shadow .25s}
.stat:hover .k{text-shadow:0 0 24px rgba(226,35,26,.30)}
.stat:hover .k.blue{text-shadow:0 0 24px rgba(86,166,242,.32)}
.stat:hover .k.green{text-shadow:0 0 24px rgba(174,242,74,.30)}

.risk .cell{transition:background .25s}
.risk .cell:hover{background:var(--bg2)}

.tbl tbody tr td{transition:background .18s}
.tbl tbody tr:hover td{background:rgba(255,255,255,.035)}
.tbl tbody tr.hl:hover td{background:rgba(226,35,26,.16)}

.ul li{transition:color .2s,padding-left .2s}
.ul li:hover{color:var(--white);padding-left:30px}
.ul li:before{transition:transform .2s,box-shadow .2s}
.ul li:hover:before{transform:scale(1.3);box-shadow:0 0 12px rgba(226,35,26,.75)}
.ul.blue li:hover:before{box-shadow:0 0 12px rgba(86,166,242,.75)}
.ul.green li:hover:before{box-shadow:0 0 12px rgba(174,242,74,.75)}

.tlitem:before{transition:transform .25s,box-shadow .25s}
.tlitem:hover:before{transform:scale(1.2);box-shadow:0 0 14px rgba(226,35,26,.75)}

.callout{transition:transform .28s,box-shadow .28s}
.callout:hover{transform:translateX(4px)}

.nlinks a{position:relative}
.nlinks a:after{content:"";position:absolute;left:0;bottom:-5px;height:2px;width:0;background:var(--red);transition:width .25s}
.nlinks a:hover:after{width:100%}
.brand .mk{transition:box-shadow .25s,transform .25s}
.brand:hover .mk{box-shadow:0 0 22px rgba(226,35,26,1);transform:rotate(45deg)}
.pill{transition:border-color .25s,color .25s}
.pill:hover{border-color:var(--red);color:var(--red-l)}
.cinfo a{transition:color .2s}.cinfo a:hover{color:var(--white)}
footer .fb .mk{transition:transform .3s}
footer .fb:hover .mk{transform:rotate(45deg)}

</style>
</head>

  <div class="gatecard">
    <div class="mk"></div>
    <div class="bd">Volty</div>
    <div class="sb">NUEN MOTO &middot; Business Plan</div>
    <div class="ti">Confidential &middot; Enter password</div>
    <div class="gateform">
      <input id="gpw" type="password" placeholder="Password" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="gbtn">Unlock</button>
      <div class="err" id="gerr"></div>
    </div>
    <div class="note">This document is encrypted. The content is not present in readable form until the correct password is supplied. Do not forward this file or the password to anyone outside the intended recipients.</div>
  </div>
</div>

function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)})}
async function decryptPlan(pw){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder().decode(pt);
}
function initPlan(){
  var nav=document.getElementById('nav');
  if(nav){addEventListener('scroll',function(){nav.classList.toggle('scrolled',scrollY>40)});}
  var io=new IntersectionObserver(function(es){es.forEach(function(e){
    if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},
    {threshold:.12,rootMargin:'0px 0px -7% 0px'});
  document.querySelectorAll('.rv').forEach(function(el){io.observe(el)});
  var cio=new IntersectionObserver(function(es){es.forEach(function(e){
    if(e.isIntersecting){var t=e.target;if(t.dataset.w){t.style.width=t.dataset.w}cio.unobserve(t)}})},
    {threshold:.5});
  document.querySelectorAll('[data-w]').forEach(function(el){cio.observe(el)});
}
async function submitGate(){
  var btn=document.getElementById('gbtn'),inp=document.getElementById('gpw'),err=document.getElementById('gerr');
  err.textContent=''; btn.disabled=true; btn.textContent='Unlocking...';
  try{
    var html=await decryptPlan(inp.value);
    document.getElementById('app').innerHTML=html;
    initPlan();
    var g=document.getElementById('gate');
    g.style.transition='opacity .4s'; g.style.opacity='0';
    setTimeout(function(){g.remove();document.body.style.overflow=''},400);
  }catch(e){
    err.textContent='Incorrect password. Try again.';
    btn.disabled=false; btn.textContent='Unlock';
    inp.value=''; inp.focus();
  }
}
document.addEventListener('DOMContentLoaded',function(){
  document.body.style.overflow='hidden';
  var inp=document.getElementById('gpw'),btn=document.getElementById('gbtn');
  btn.addEventListener('click',submitGate);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')submitGate()});
  inp.focus();
});
</script>
